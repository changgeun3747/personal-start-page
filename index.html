<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>오늘의 시작</title>
    <meta name="theme-color" content="#3ca370" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://api.open-meteo.com" />
    <link rel="preconnect" href="https://geocoding-api.open-meteo.com" />
    <link rel="preconnect" href="https://api.rss2json.com" />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="topbar" aria-label="시작 영역">
        <div class="hero-copy">
          <p class="eyebrow" id="todayLabel">오늘</p>
          <h1>밝게, 가볍게, 필요한 것만.</h1>
          <p class="hero-note">날씨와 기술 뉴스를 한 화면에서 바로 확인하세요.</p>
        </div>

        <div class="utility-panel">
          <div class="clock-panel" aria-live="polite">
            <p class="eyebrow">Clock</p>
            <strong id="clockTime">00:00</strong>
            <span id="clockDate">요일, 날짜</span>
          </div>

          <div class="quick-actions">
            <button class="install-button" id="installButton" type="button" hidden>앱 설치</button>
            <form class="search" id="searchForm" role="search">
              <label class="sr-only" for="searchInput">검색어</label>
              <input
                id="searchInput"
                name="q"
                type="search"
                placeholder="궁금한 것을 검색하세요"
                autocomplete="off"
              />
              <button type="submit">검색</button>
            </form>
          </div>
        </div>
      </section>

      <section class="dashboard" aria-label="오늘의 날씨와 뉴스">
        <section class="weather-panel" aria-labelledby="weatherTitle">
          <div class="weather-image" role="presentation"></div>
          <div class="weather-content">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Weather</p>
                <h2 id="weatherTitle">오늘의 날씨</h2>
              </div>
              <button class="ghost-button" id="locateButton" type="button">내 위치</button>
            </div>

            <form class="city-form" id="cityForm">
              <label class="sr-only" for="cityInput">도시</label>
              <input id="cityInput" name="city" type="search" placeholder="도시 검색: Seoul, Busan, Tokyo" />
              <button type="submit">변경</button>
            </form>

            <div class="weather-now" id="weatherNow">
              <p class="muted">날씨를 불러오는 중입니다.</p>
            </div>

            <div class="forecast-strip" id="forecastStrip" aria-label="7일 예보"></div>
          </div>
        </section>

        <section class="news-panel" aria-labelledby="newsTitle">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Tech News</p>
              <h2 id="newsTitle">기술 뉴스 브리프</h2>
            </div>
            <button class="ghost-button" id="refreshNewsButton" type="button">새로고침</button>
          </div>

          <div class="topic-row" id="topicRow" aria-label="뉴스 주제">
            <button class="topic" data-topic="top" type="button">주요</button>
            <button class="topic" data-topic="business" type="button">경제</button>
            <button class="topic is-active" data-topic="tech" type="button">기술</button>
            <button class="topic" data-topic="world" type="button">세계</button>
          </div>

          <div class="news-list" id="newsList">
            <p class="muted">뉴스를 불러오는 중입니다.</p>
          </div>
        </section>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
